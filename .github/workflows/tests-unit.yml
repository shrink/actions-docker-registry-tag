name: "Test Action (Unit)"

on:
  pull_request:
  push:
    branches:
      - "**"

jobs:
  test-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: "package.json"
      - run: npm install
      - name: Execute unit tests
        run: npm run test
